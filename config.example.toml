schema_version = 1
refresh_interval = 3.0
preview_lines = 80

legacy_state_dirs = [
  "~/.local/state/wf/sessions",
  "~/.ws-session-notes",
]

[interface]
animations = "subtle" # off, subtle, full
reduce_motion = false

[tools.claude]
command = ["claude"]
enabled = true

[tools.codex]
command = ["codex"]
enabled = true

[tools.hermes]
command = ["hermes", "chat"]
enabled = true

[tools.shell]
command = ["/bin/bash", "-l"]
enabled = true
