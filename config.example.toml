schema_version = 1
refresh_interval = 3.0
preview_lines = 80
fallback_to_classic_on_error = false

# Set this during migration to a preserved copy of the classic implementation.
# classic_command = "~/.local/libexec/wf-classic"

legacy_state_dirs = [
  "~/.local/state/wf/sessions",
  "~/.ws-session-notes",
]

[tools.claude]
command = ["claude"]
enabled = true

[tools.codex]
command = ["codex"]
enabled = true

[tools.hermes]
command = ["hermes", "chat"]
enabled = true

[tools.shell]
command = ["/bin/bash", "-l"]
enabled = true

