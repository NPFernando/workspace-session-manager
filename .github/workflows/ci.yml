name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux
      - name: Install project
        run: uv sync --locked --extra dev
      - name: Ruff format
        run: uv run ruff format --check .
      - name: Ruff lint
        run: uv run ruff check .
      - name: Type check
        run: uv run mypy
      - name: Unit and TUI tests
        run: uv run pytest -m 'not integration'
      - name: Isolated tmux integration test
        env:
          WS_RUN_TMUX_INTEGRATION: "1"
        run: uv run pytest -m integration -q --no-cov
      - name: Secret and privacy scan
        run: scripts/secret-scan.sh

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error
