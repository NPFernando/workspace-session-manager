name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux
      - name: Install project
        run: python -m pip install -e '.[dev]'
      - name: Ruff format
        run: ruff format --check .
      - name: Ruff lint
        run: ruff check .
      - name: Type check
        run: mypy
      - name: Unit and TUI tests
        run: pytest -m 'not integration'
      - name: Isolated tmux integration test
        env:
          WS_RUN_TMUX_INTEGRATION: "1"
        run: pytest -m integration -q --no-cov
      - name: Secret and privacy scan
        run: scripts/secret-scan.sh

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
