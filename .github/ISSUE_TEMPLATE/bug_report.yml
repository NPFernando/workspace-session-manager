name: Bug report
description: Report reproducible ws behavior without private session data.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include credentials, private pane output, or production session notes.
  - type: input
    id: version
    attributes:
      label: ws version
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Linux, Python, tmux, terminal, and SSH client versions
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Observed behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction using a disposable session
    validations:
      required: true

